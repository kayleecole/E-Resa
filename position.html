<!doctype html>

<html lang="en">

<head>

    <style>
        div {
            width: 300px;
            height: 300px; 
            background:rgb(155, 202, 155);
            margin: 50px;
        }

        #static {
            background: rgb(213, 123, 123);
            position: static;
            /*default position*/
        }

        #sticky {
            background: pink;
            position: sticky;
            /*static until hits edge*/
        }

        #relative {
            background: rgb(89, 161, 254);
            position: sticky;
            /*moves box but leaves hole*/
            top: -100px;
            left: 100px;

        }

        #absolute {
            background: rgb(255, 140, 253);
            position:absolute;
            /*stuck to content, no hole*/
            right:30px;
            bottom: 50px;
        }
        #fixed {
            background: rgb(183, 255, 241);
            position:fixed;
            /*stuck to screen,leaves no hole*/
            right:50px;
            top: 50px;
        }
    </style>
</head>

<body>
    <div id="static"></div>
    <div id="sticky"></div>
    <div id="relative"></div>
    <div id="absolute"></div>
    <div id="fixed"></div>
    </body>

</html>
